allowBuilds:
  esbuild: true

overrides:
  "@codecov/bundler-plugin-core@1>@actions/core": npm:@actions/core@2
  "@codecov/bundler-plugin-core@1>@actions/github": npm:@actions/github@8

configDependencies:
  pacquet: ^0.11.10

enableGlobalVirtualStore: true

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "@oxlint/*"
  - oxc-config-hope
  - oxfmt
  - oxlint

trustPolicy: no-downgrade

trustPolicyExclude:
  # babel
  - semver@6.3.1
  # node types
  - undici-types@6.21.0
